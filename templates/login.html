<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema de Configuração</title>
  <style>
    :root {
      --cor-primaria: #007bff;
      --cor-primaria-hover: #0056b3;
      --cor-fundo: #f8f9fa;
      --cor-card: #ffffff;
      --cor-texto: #212529;
      --cor-label: #495057;
      --cor-borda: #dee2e6;
      --sombra: 0 4px 12px rgba(0, 0, 0, 0.05);
      --border-radius: 8px;
      --transition-speed: 0.2s;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--cor-texto);
      line-height: 1.6;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-card {
      background-color: var(--cor-card);
      border-radius: var(--border-radius);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, var(--cor-primaria) 0%, var(--cor-primaria-hover) 100%);
      color: white;
      padding: 30px 25px;
      text-align: center;
    }
    .login-header h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 600;
    }
    .login-header p {
      margin: 8px 0 0;
      opacity: 0.9;
      font-size: 0.95rem;
    }
    .login-body {
      padding: 35px 30px;
    }
    .flash {
      padding: 12px 15px;
      margin-bottom: 20px;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .flash.success {
      background-color: #d1e7dd;
      color: #0f5132;
      border-color: #badbcc;
    }
    .flash.error {
      background-color: #f8d7da;
      color: #842029;
      border-color: #f5c2c7;
    }
    .flash.warning {
      background-color: #fff3cd;
      color: #856404;
      border-color: #ffeeba;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--cor-label);
      font-size: 0.95rem;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid var(--cor-borda);
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--cor-primaria);
      box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
    }
    button {
      width: 100%;
      background-color: var(--cor-primaria);
      color: white;
      padding: 14px 20px;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 10px;
    }
    button:hover {
      background-color: var(--cor-primaria-hover);
    }
    button:active {
      transform: scale(0.98);
    }
    .login-footer {
      text-align: center;
      padding: 20px;
      background-color: #f8f9fa;
      font-size: 0.85rem;
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>🔐 Login</h1>
        <p>Sistema de Configuração de Origens</p>
      </div>
      
      <div class="login-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form method="post">
          <!-- Campo oculto para o token CSRF -->
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
          
          <div class="form-group">
            <label for="username">Usuário</label>
            <input type="text" name="username" id="username" required autofocus autocomplete="username">
          </div>
          
          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" required autocomplete="current-password">
          </div>
          
          <button type="submit">Entrar</button>
        </form>
      </div>
      
      <div class="login-footer">
        Sistema de Monitoramento 3ZX © 2026
      </div>
    </div>
  </div>
</body>
</html>
