services:
  # Redis exclusivo para a aplicação Spots (não interfere em outros sistemas)
  spots_redis:
    image: redis:alpine
    container_name: spots_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - spots_redis_data:/data
    networks:
      - spots-net
    ports:
      - "6379:6379"

  # Painel Web Flask
  spots_web:
    container_name: spots_web
    build:
      context: .
      dockerfile: Dockerfile
    image: willianmoura3zx/spots:1.0
    command: python app.py
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - spots_redis
    environment:
      SECRET_KEY: ${SECRET_KEY:-VHovuUGvuovY8vUHv088yv0v80Vhougv97TV07g}
      FLASK_DEBUG: ${FLASK_DEBUG:-False}
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: "5000"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      # Aponta para o Redis local deste docker-compose
      REDIS_URL: ${REDIS_URL}
    networks:
      - spots-net

  # Monitor rodando em background
  spots_monitor:
    container_name: spots_monitor
    image: willianmoura3zx/spots:1.0
    command: python -u monitor_leiloes.py
    restart: always
    depends_on:
      - spots_redis
    environment:
      REDIS_URL: ${REDIS_URL}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./credentials_sheets.json:/app/credentials_sheets.json:ro
      - ./token.json:/app/token.json
    networks:
      - spots-net

volumes:
  spots_redis_data:

networks:
  spots-net:
    name: spots-net
    driver: bridge